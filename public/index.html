<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLYGPT PLUS | 自动化开通系统</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <section id="publicRuntimeCard" class="public-runtime-panel load-low">
        <div class="public-runtime-layout">
            <div class="public-runtime-title">前台并发槽位信息</div>
            <div id="publicForegroundSlots" class="public-runtime-value">0/0</div>
            <div id="publicForegroundSlotsMeta" class="public-runtime-meta">当前空闲，前台槽位状态正常</div>
            <div id="publicForegroundSlotGrid" class="public-slot-grid"></div>
        </div>
    </section>

    <main class="glass-container">
        <div class="main-title">FLYGPT PLUS</div>
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="redeem">CDK 兑换</button>
            <button class="tab-btn" data-tab="query">CDK 查询</button>
        </nav>

        <!-- 兑换板块 -->
        <div id="redeemSection">
            <!-- 步骤一 -->
            <div id="step1">
                <header>
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                            </path>
                        </svg>
                    </div>
                    <h1>CDK 兑换</h1>
                    <p>请输入您的激活码以进行兑换</p>
                </header>
                <section class="input-group">
                    <input type="text" id="cdkInput" placeholder="请输入您的兑换码" maxlength="32">
                    <button id="redeemBtn"><span class="btn-text">下一步</span>
                        <div class="loader"></div>
                    </button>
                </section>
            </div>

            <!-- 步骤二 (自助激活) -->
            <div id="step2" style="display: none;">
                <section class="input-group" style="margin-top: 10px;">
                    <div class="textarea-wrapper">
                        <a href="https://chatgpt.com/api/auth/session" target="_blank"
                            class="get-token-btn-floating">获取Token</a>
                        <textarea id="tokenInput" placeholder="在此粘贴全选复制的代码，系统将自动提取 Token" rows="4"></textarea>
                    </div>
                    <button id="startBtn" class="btn-primary"><span class="btn-text">确认并启动自动化开通</span>
                        <div class="loader"></div>
                    </button>
                    <button id="backToStep1" class="btn-secondary">返回重新输入 CDK</button>
                </section>
            </div>

            <!-- 步骤二 (成品号兑换) -->
            <div id="stepProduct" style="display: none;">
                <header>
                    <div class="logo product-logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                            </path>
                            <polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline>
                            <polyline points="7.5 19.79 7.5 14.6 12 12 16.5 14.6 16.5 19.79"></polyline>
                            <polyline points="12 22 12 12"></polyline>
                        </svg>
                    </div>
                    <h1>成品号兑换</h1>
                    <p>您正在兑换成品账号，点击下方按钮确认领取</p>
                </header>
                <div id="productCdkDisplay" style="margin-bottom: 20px;"></div>
                <section class="input-group">
                    <button id="confirmProductBtn" class="btn-primary"
                        style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                        <span class="btn-text">立即领取账号</span>
                        <div class="loader"></div>
                    </button>
                    <button id="backToStep1FromProduct" class="btn-secondary">返回</button>
                </section>
            </div>
        </div>

        <!-- 查询板块 -->
        <div id="querySection" style="display: none;">
            <header>
                <div class="logo query-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <h1>CDK 查询</h1>
                <p>输入激活码即可实时查询 CDK 状态与记录</p>
            </header>
            <section class="input-group">
                <input type="text" id="queryInput" placeholder="请输入要查询的激活码" maxlength="32">
                <button id="queryBtn"><span class="btn-text">立即查询</span>
                    <div class="loader"></div>
                </button>
            </section>
        </div>

        <div id="taskProgress" class="task-progress" style="display: none;">
            <div class="task-progress-header">
                <span id="taskProgressText" style="display: none;">开通进度</span>
                <b id="taskProgressPercent">0%</b>
            </div>
            <div class="task-progress-track">
                <div id="taskProgressBar" class="task-progress-bar"></div>
            </div>
        </div>
        <div id="statusMessage" class="status-message"></div>
    </main>

    <script>
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const stepProduct = document.getElementById('stepProduct');
        const cdkInput = document.getElementById('cdkInput');
        const tokenInput = document.getElementById('tokenInput');
        const redeemBtn = document.getElementById('redeemBtn');
        const startBtn = document.getElementById('startBtn');
        const confirmProductBtn = document.getElementById('confirmProductBtn');
        const statusMsg = document.getElementById('statusMessage');
        const queryBtn = document.getElementById('queryBtn');
        const queryInput = document.getElementById('queryInput');
        const redeemSection = document.getElementById('redeemSection');
        const querySection = document.getElementById('querySection');
        const backToStep1 = document.getElementById('backToStep1');
        const backToStep1FromProduct = document.getElementById('backToStep1FromProduct');
        const taskProgress = document.getElementById('taskProgress');
        const taskProgressBar = document.getElementById('taskProgressBar');
        const taskProgressPercent = document.getElementById('taskProgressPercent');
        const taskProgressText = document.getElementById('taskProgressText');
        const publicRuntimeCard = document.getElementById('publicRuntimeCard');
        const publicForegroundSlots = document.getElementById('publicForegroundSlots');
        const publicForegroundSlotGrid = document.getElementById('publicForegroundSlotGrid');
        const publicForegroundSlotsMeta = document.getElementById('publicForegroundSlotsMeta');
        const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
        let taskProgressValue = 0;
        let activationLocked = false;
        let publicRuntimeTimer = null;

        function buildImapLink(imapKey) {
            const key = String(imapKey || '').trim();
            if (!key) {
                return '';
            }
            const href = `https://imap.chiyiyi.cloud/?key=${encodeURIComponent(key)}`;
            return `<a href="${href}" target="_blank" rel="noopener noreferrer" style="color: var(--accent); font-family: monospace; text-decoration: none;">${key}</a>`;
        }

        function decodeJwtPart(part) {
            const normalized = String(part || '').replace(/-/g, '+').replace(/_/g, '/');
            const padded = normalized.padEnd(normalized.length + ((4 - normalized.length % 4) % 4), '=');
            return JSON.parse(atob(padded));
        }

        function validateAccessToken(token) {
            const value = String(token || '').trim();
            if (!value) {
                return { valid: false, message: '请输入 AccessToken' };
            }

            const parts = value.split('.');
            if (parts.length !== 3 || parts.some((item) => !item)) {
                return { valid: false, message: '该 Token 不合法：格式错误' };
            }

            let header;
            let payload;
            try {
                header = decodeJwtPart(parts[0]);
                payload = decodeJwtPart(parts[1]);
            } catch (_) {
                return { valid: false, message: '该 Token 不合法：无法解析' };
            }

            if (header.typ !== 'JWT') {
                return { valid: false, message: '该 Token 不合法：类型错误' };
            }

            if (header.alg !== 'RS256') {
                return { valid: false, message: '该 Token 不合法：算法错误' };
            }

            if (payload.iss !== 'https://auth.openai.com') {
                return { valid: false, message: '该 Token 不合法：签发方错误' };
            }

            const audiences = Array.isArray(payload.aud) ? payload.aud : [payload.aud].filter(Boolean);
            if (!audiences.includes('https://api.openai.com/v1')) {
                return { valid: false, message: '该 Token 不合法：aud 不匹配' };
            }

            const authInfo = payload['https://api.openai.com/auth'];
            if (!authInfo || !authInfo.chatgpt_account_id || !authInfo.chatgpt_user_id) {
                return { valid: false, message: '该 Token 不合法：缺少账户信息' };
            }

            const scopes = Array.isArray(payload.scp) ? payload.scp : [];
            if (!scopes.includes('model.request')) {
                return { valid: false, message: '该 Token 不合法：缺少 model.request 权限' };
            }

            const exp = Number(payload.exp || 0);
            const now = Math.floor(Date.now() / 1000);
            if (!exp || !Number.isFinite(exp)) {
                return { valid: false, message: '该 Token 不合法：缺少过期时间' };
            }
            if (exp <= now) {
                return { valid: false, message: '该 Token 已过期' };
            }

            return {
                valid: true,
                message: 'AccessToken 校验通过',
                email: payload['https://api.openai.com/profile']?.email || ''
            };
        }

        function setActivationLock(locked) {
            activationLocked = Boolean(locked);
            backToStep1.disabled = activationLocked;
            backToStep1FromProduct.disabled = activationLocked;
            tabButtons.forEach((btn) => {
                btn.disabled = activationLocked;
            });
        }

        // Tab 切换逻辑
        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (activationLocked) {
                    return;
                }
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                if (tab === 'redeem') {
                    redeemSection.style.display = 'block';
                    querySection.style.display = 'none';
                } else {
                    redeemSection.style.display = 'none';
                    querySection.style.display = 'block';
                    hideProgress();
                }
                statusMsg.style.display = 'none';
            });
        });



        // 查询逻辑
        queryBtn.addEventListener('click', async () => {
            const cdk = queryInput.value.trim();
            if (!cdk) return showStatus('请输入激活码', 'error');

            toggleLoading(queryBtn, true);
            statusMsg.style.display = 'none';

            try {
                const response = await fetch(`/api/cdk/query?cdk=${cdk}`);
                const data = await response.json();
                if (data.success) {
                    const statusText = String(data.data.status || (data.data.usedAt ? '已使用' : '未使用'));
                    const isProcessing = statusText === '开通中';
                    const isUsed = statusText === '已使用';
                    const statusColor = isProcessing ? '#f59e0b' : (isUsed ? '#f87171' : '#10b981');
                    const typeText = data.data.type === '成品' ? '成品激活码' : '自助激活码';
                    const resultHtml = `
                        <div class="query-result-card" style="text-align: left; background: rgba(255,255,255,0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); margin-top: 10px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                                <span style="color: var(--text-dim);">CDK 类型</span>
                                <span style="color: ${data.data.type === '成品' ? '#10b981' : '#818cf8'}; font-weight: 600;">${typeText}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                                <span style="color: var(--text-dim);">当前状态</span>
                                <span style="color: ${statusColor}; font-weight: 600;">${statusText}</span>
                            </div>
                            ${isUsed ? `
                            <div style="display: flex; justify-content: space-between;">
                                <span style="color: var(--text-dim);">使用时间</span>
                                <span style="color: var(--text-main);">${data.data.usedAt}</span>
                            </div>
                            ` : ''}
                            ${(data.data.type === '成品' && isUsed && data.data.imapKey) ? `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                                <span style="color: var(--text-dim);">IMAP KEY</span>
                                ${buildImapLink(data.data.imapKey)}
                            </div>
                            ` : ''}
                            ${(data.data.type === '成品' && isUsed && (data.data.sub2apiAvailable || data.data.cpaAvailable)) ? `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                                <span style="color: var(--text-dim);">下载凭证</span>
                                <div style="display: flex; gap: 8px;">
                                    ${data.data.sub2apiAvailable ? `<button id="queryDownloadSub2apiBtn" class="copy-btn-mini" style="min-width: 72px; height: 28px; padding: 2px 10px; font-size: 11px; line-height: 1;">sub2api</button>` : ''}
                                    ${data.data.cpaAvailable ? `<button id="queryDownloadCpaBtn" class="copy-btn-mini" style="min-width: 48px; height: 28px; padding: 2px 10px; font-size: 11px; line-height: 1;">cpa</button>` : ''}
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    `;
                    showStatus(resultHtml, isUsed ? 'error' : 'success');
                    const queryDownloadSub2apiBtn = document.getElementById('queryDownloadSub2apiBtn');
                    if (queryDownloadSub2apiBtn) {
                        queryDownloadSub2apiBtn.addEventListener('click', () => {
                            window.location.href = `/api/cdk/download?cdk=${encodeURIComponent(cdk)}&kind=sub2api`;
                        });
                    }
                    const queryDownloadCpaBtn = document.getElementById('queryDownloadCpaBtn');
                    if (queryDownloadCpaBtn) {
                        queryDownloadCpaBtn.addEventListener('click', () => {
                            window.location.href = `/api/cdk/download?cdk=${encodeURIComponent(cdk)}&kind=cpa`;
                        });
                    }
                } else {
                    showStatus(data.message, 'error');
                }
            } catch (error) {
                showStatus('查询失败', 'error');
            } finally {
                toggleLoading(queryBtn, false);
            }
        });
        let verifiedCdk = '';
        const START_DEFAULT_TEXT = '确认并启动自动化开通';
        const START_PENDING_TEXT = '已使用';
        const START_FAILED_TEXT = '未使用';
        const START_SUCCESS_TEXT = '激活成功';

        tokenInput.addEventListener('input', () => {
            const content = tokenInput.value.trim();
            if (!content.startsWith('{')) {
                if (!content) {
                    return;
                }
                const result = validateAccessToken(content);
                if (result.valid) {
                    showStatus(result.email ? `AccessToken 校验通过：${result.email}` : result.message, 'success');
                } else {
                    showStatus(result.message, 'error');
                }
                return;
            }

            try {
                const data = JSON.parse(content);
                if (data && data.accessToken) {
                    tokenInput.value = data.accessToken;
                    const result = validateAccessToken(data.accessToken);
                    if (result.valid) {
                        showStatus(result.email ? `解析成功，Token 有效：${result.email}` : '解析成功：已自动提取 AccessToken', 'success');
                    } else {
                        showStatus(result.message, 'error');
                    }
                } else {
                    showStatus('JSON 结构错误：未找到 accessToken 字段，请确保复制了完整页面', 'error');
                }
            } catch (error) {
                showStatus('无效的 JSON 格式', 'error');
            }
        });

        redeemBtn.addEventListener('click', async () => {
            const cdk = cdkInput.value.trim();
            if (!cdk) {
                return showStatus('请输入兑换码', 'error');
            }

            toggleLoading(redeemBtn, true);

            try {
                const response = await fetch('/api/verify-cdk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cdk })
                });
                const data = await response.json();

                if (data.success) {
                    verifiedCdk = cdk;
                    const cdkType = data.data?.type || '自助';
                    const isProcessing = data.data?.status === 'processing';

                    if (isProcessing && data.data?.jobKey) {
                        taskCompleted = false;
                        activeJobKey = data.data.jobKey;
                        setActivationLock(true);
                        showProgress();
                        setProgress(3, '');
                        showStatus(data.data?.message || '检测到当前 CDK 正在开通中，正在恢复任务进度...', 'success');
                        step1.style.display = 'none';
                        step2.style.display = 'none';
                        stepProduct.style.display = 'none';
                        if (cdkType === '成品') {
                            trackProductTask(data.data.jobKey);
                        } else {
                            initWebSocket(data.data.jobKey);
                        }
                        return;
                    }

                    if (cdkType === '成品') {
                        step1.style.display = 'none';
                        stepProduct.style.display = 'block';
                        document.getElementById('productCdkDisplay').innerHTML = `
                            <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                                <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 4px;">激活码</div>
                                <code style="font-size: 16px; color: #fff;">${cdk}</code>
                            </div>
                        `;
                    } else {
                        step1.style.display = 'none';
                        step2.style.display = 'block';

                        // Add a display for CDK info in step 2
                        let infoDiv = document.getElementById('redeemCdkInfo');
                        if (!infoDiv) {
                            infoDiv = document.createElement('div');
                            infoDiv.id = 'redeemCdkInfo';
                            infoDiv.style.marginBottom = '15px';
                            step2.prepend(infoDiv);
                        }
                        infoDiv.innerHTML = `<div><code style="font-size:16px;">${cdk}</code></div>`;
                    }
                    statusMsg.style.display = 'none';
                } else {
                    showStatus(data.message || '兑换码无效或已使用', 'error');
                }
            } catch (error) {
                showStatus('网络请求失败', 'error');
            } finally {
                toggleLoading(redeemBtn, false);
            }
        });

        backToStep1.addEventListener('click', () => {
            if (activationLocked) {
                return;
            }
            resetRedeemFlow();
        });

        backToStep1FromProduct.addEventListener('click', () => {
            if (activationLocked) {
                return;
            }
            resetRedeemFlow();
        });

        confirmProductBtn.addEventListener('click', async () => {
            if (!verifiedCdk) return;

            toggleLoading(confirmProductBtn, true);
            statusMsg.style.display = 'none';

            try {
                const response = await fetch('/api/redeem-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cdk: verifiedCdk })
                });
                const data = await response.json();

                if (data.success && data.jobKey) {
                    trackProductTask(data.jobKey);
                } else {
                    showStatus(data.message || '兑换失败，请稍后再试', 'error');
                    toggleLoading(confirmProductBtn, false);
                }
            } catch (error) {
                showStatus('网络请求失败', 'error');
                toggleLoading(confirmProductBtn, false);
            }
        });

        function trackProductTask(jobKey) {
            // 设置初始状态与自助开通一致
            activeJobKey = jobKey;
            taskCompleted = false;
            setActivationLock(true);
            toggleLoading(confirmProductBtn, true);

            // 显示进度条 (使用全局 taskProgress)
            taskProgress.style.display = 'block';
            setProgress(5, '正在初始化任务...');

            let productSocket = null;
            let productHeartbeatInterval = null;
            let productHeartbeatTimeout = null;
            let productReconnectTimer = null;

            function clearProductHeartbeat() {
                clearInterval(productHeartbeatInterval);
                clearTimeout(productHeartbeatTimeout);
                productHeartbeatInterval = null;
                productHeartbeatTimeout = null;
            }

            function cleanupProductSocket() {
                clearProductHeartbeat();
                clearTimeout(productReconnectTimer);
                productReconnectTimer = null;
                if (productSocket) {
                    try {
                        productSocket.close();
                    } catch (_) { }
                }
                productSocket = null;
            }

            function scheduleProductHeartbeatTimeout() {
                clearTimeout(productHeartbeatTimeout);
                productHeartbeatTimeout = setTimeout(() => {
                    if (productSocket && !taskCompleted && activeJobKey === jobKey) {
                        console.warn('Product WS heartbeat timeout, reconnecting...');
                        try {
                            productSocket.close();
                        } catch (_) { }
                    }
                }, WS_HEARTBEAT_TIMEOUT_MS);
            }

            function startProductHeartbeat() {
                clearProductHeartbeat();
                scheduleProductHeartbeatTimeout();
                productHeartbeatInterval = setInterval(() => {
                    if (!productSocket || productSocket.readyState !== WebSocket.OPEN) {
                        return;
                    }
                    try {
                        productSocket.send(JSON.stringify({ type: 'ping', ts: Date.now() }));
                        scheduleProductHeartbeatTimeout();
                    } catch (error) {
                        console.error('Product WS ping failed:', error);
                    }
                }, WS_HEARTBEAT_INTERVAL_MS);
            }

            function connectProductSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                productSocket = new WebSocket(`${protocol}//${window.location.host}`);

                productSocket.onopen = () => {
                    clearTimeout(productReconnectTimer);
                    productReconnectTimer = null;
                    productSocket.send(JSON.stringify({ type: 'subscribe', jobKey }));
                    startProductHeartbeat();
                };

                productSocket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'pong') {
                            scheduleProductHeartbeatTimeout();
                            return;
                        }
                        if (data.jobKey !== jobKey) return;

                        scheduleProductHeartbeatTimeout();

                        const progress = data.progress || 0;
                        const message = data.message || '';
                        const status = data.status || 'running';

                        if (status === 'success') {
                            taskCompleted = true;
                            cleanupProductSocket();
                            setActivationLock(false);
                            setProgress(100, '', 'success');

                            const result = data.result;
                            const successHtml = `
                            <div style="text-align: left; animation: slideUp 0.4s ease-out;">
                                <div style="font-size: 18px; color: #10b981; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> 成品号开通成功
                                </div>
                                <div style="margin-bottom: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                                    <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 4px;">交付邮箱</div>
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <code style="color: #fff; font-size: 14px;">${result.email}</code>
                                        <button class="copy-btn-mini" onclick="copyTextToClipboard('${result.email}')">复制</button>
                                    </div>
                                </div>
                                ${result.imapKey ? `
                                <div style="margin-bottom: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                                    <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 4px;">IMAP KEY</div>
                                    <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;">
                                        ${buildImapLink(result.imapKey)}
                                        <button class="copy-btn-mini" onclick="copyTextToClipboard('${result.imapKey}')">复制</button>
                                    </div>
                                </div>
                                ` : ''}
                                <div style="margin-bottom: 20px; font-size: 13px; color: var(--text-dim); line-height: 1.6;">
                                    账号已成功开通 Plus 并提取协议数据。
                                </div>
                                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                                    <button id="downloadSubBtn" class="btn-primary" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); flex: 1; min-width: 180px;">
                                        <span class="btn-text">下载 sub2api</span>
                                    </button>
                                    ${result.cpaFile ? `
                                    <button id="downloadCpaBtn" class="btn-primary" style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); flex: 1; min-width: 140px;">
                                        <span class="btn-text">下载 cpa</span>
                                    </button>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                            stepProduct.style.display = 'none';
                            showStatus(successHtml, 'success');

                            document.getElementById('downloadSubBtn').addEventListener('click', () => {
                                window.location.href = `/api/download-sub2api/${result.sub2apiFile}`;
                            });
                            const downloadCpaBtn = document.getElementById('downloadCpaBtn');
                            if (downloadCpaBtn) {
                                downloadCpaBtn.addEventListener('click', () => {
                                    window.location.href = `/api/download-cpa/${result.cpaFile}`;
                                });
                            }
                        } else if (status === 'failed' || status === 'maintenance') {
                            taskCompleted = true;
                            cleanupProductSocket();
                            setActivationLock(false);
                            setProgress(100, '', 'error');
                            showStatus(message || '创建失败，请稍后重试', 'error');
                            toggleLoading(confirmProductBtn, false);
                        } else {
                            // 更新进度
                            setProgress(progress, message);
                        }
                    } catch (e) {
                        console.error('WS Error:', e);
                    }
                };

                productSocket.onclose = () => {
                    clearProductHeartbeat();
                    productSocket = null;
                    if (activeJobKey === jobKey && !taskCompleted) {
                        showStatus('连接中断，正在重连...', 'error');
                        clearTimeout(productReconnectTimer);
                        productReconnectTimer = setTimeout(connectProductSocket, 3000);
                    }
                };

                productSocket.onerror = (error) => {
                    console.error('Product WS Error:', error);
                };
            }

            connectProductSocket();
        }

        async function copyTextToClipboard(text) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const input = document.createElement('textarea');
                    input.value = text;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                }
                alert('已复制到剪贴板');
            } catch (err) {
                console.error('复制失败', err);
            }
        }

        let socket = null;
        let reconnectTimer = null;
        let activeJobKey = '';
        let taskCompleted = false;
        let socketHeartbeatInterval = null;
        let socketHeartbeatTimeout = null;
        const WS_HEARTBEAT_INTERVAL_MS = 5000;
        const WS_HEARTBEAT_TIMEOUT_MS = 12000;

        function clearSocketHeartbeat() {
            clearInterval(socketHeartbeatInterval);
            clearTimeout(socketHeartbeatTimeout);
            socketHeartbeatInterval = null;
            socketHeartbeatTimeout = null;
        }

        function scheduleSocketHeartbeatTimeout() {
            clearTimeout(socketHeartbeatTimeout);
            socketHeartbeatTimeout = setTimeout(() => {
                if (socket && activeJobKey && !taskCompleted) {
                    console.warn('Task WS heartbeat timeout, reconnecting...');
                    try {
                        socket.close();
                    } catch (_) { }
                }
            }, WS_HEARTBEAT_TIMEOUT_MS);
        }

        function startSocketHeartbeat() {
            clearSocketHeartbeat();
            scheduleSocketHeartbeatTimeout();
            socketHeartbeatInterval = setInterval(() => {
                if (!socket || socket.readyState !== WebSocket.OPEN) {
                    return;
                }
                try {
                    socket.send(JSON.stringify({ type: 'ping', ts: Date.now() }));
                    scheduleSocketHeartbeatTimeout();
                } catch (error) {
                    console.error('Task WS ping failed:', error);
                }
            }, WS_HEARTBEAT_INTERVAL_MS);
        }

        function closeTaskSocket() {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
            clearSocketHeartbeat();
            if (socket) {
                try {
                    socket.close();
                } catch (_) { }
            }
            socket = null;
            activeJobKey = '';
        }

        function resetRedeemFlow(options = {}) {
            const preserveStatus = Boolean(options.preserveStatus);
            closeTaskSocket();
            taskCompleted = false;
            setActivationLock(false);

            // 恢复所有按钮状态
            toggleLoading(redeemBtn, false);
            toggleLoading(startBtn, false);
            toggleLoading(confirmProductBtn, false);
            redeemBtn.disabled = false;
            startBtn.disabled = false;
            confirmProductBtn.disabled = false;

            // 重置文案
            setButtonText(startBtn, START_DEFAULT_TEXT);
            setButtonText(confirmProductBtn, '确认领取账号');

            step2.style.display = 'none';
            stepProduct.style.display = 'none';
            step1.style.display = 'block';
            cdkInput.value = '';
            tokenInput.value = '';
            verifiedCdk = '';

            taskProgress.style.display = 'none';
            hideProgress();

            if (!preserveStatus) {
                statusMsg.style.display = 'none';
            }
        }

        function applyTaskState(data, source = 'update') {
            const progress = Number(data.progress);
            const status = String(data.status || 'running');
            const message = String(data.message || '');

            if (status === 'success') {
                taskCompleted = true;
                closeTaskSocket();
                setActivationLock(false);
                setProgress(100, '', 'success');
                showStatus(message || '激活成功！', 'success');
                setButtonText(startBtn, START_SUCCESS_TEXT);
                toggleLoading(startBtn, false);
                startBtn.disabled = true;
                return;
            }

            if (status === 'failed' || status === 'maintenance') {
                taskCompleted = true;
                closeTaskSocket();
                setActivationLock(false);
                setProgress(100, '', 'error');
                showStatus(
                    status === 'maintenance'
                        ? (message || '系统维护中')
                        : (message || '激活失败，请更换账号重试'),
                    'error'
                );
                setButtonText(startBtn, START_FAILED_TEXT);
                toggleLoading(startBtn, false);
                return;
            }

            // 正在开通中
            if (Number.isFinite(progress)) {
                setProgress(progress, '');
                if (message) {
                    showStatus(message, 'success');
                }
            }
        }

        function initWebSocket(jobKey) {
            if (!jobKey) {
                return;
            }

            activeJobKey = jobKey;

            if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
                socket.send(JSON.stringify({ type: 'subscribe', jobKey }));
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//${window.location.host}`);

            socket.onopen = () => {
                console.log('WebSocket Connected');
                clearTimeout(reconnectTimer);
                socket.send(JSON.stringify({ type: 'subscribe', jobKey }));
                startSocketHeartbeat();
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'pong') {
                        scheduleSocketHeartbeatTimeout();
                        return;
                    }
                    if (data.jobKey && activeJobKey && data.jobKey !== activeJobKey) {
                        return;
                    }
                    scheduleSocketHeartbeatTimeout();
                    if (data.type === 'snapshot' || data.type === 'progress' || data.type === 'status') {
                        applyTaskState(data, data.type);
                    }
                } catch (e) {
                    console.error('WS Message Error:', e);
                }
            };

            socket.onclose = () => {
                console.log('WebSocket Disconnected');
                clearSocketHeartbeat();
                socket = null;
                // 只有在任务还未结束时才尝试重连
                if (activeJobKey && !taskCompleted) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = setTimeout(() => initWebSocket(activeJobKey), 3000);
                }
            };

            socket.onerror = (error) => {
                console.error('WebSocket Error:', error);
            };
        }

        startBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            if (!token) return showStatus('请输入 AccessToken', 'error');
            if (!verifiedCdk) return showStatus('请先验证 CDK', 'error');
            const tokenCheck = validateAccessToken(token);
            if (!tokenCheck.valid) {
                return showStatus(tokenCheck.message, 'error');
            }

            setButtonText(startBtn, START_PENDING_TEXT);
            toggleLoading(startBtn, true, { keepTextVisible: true });
            startBtn.disabled = true;
            setActivationLock(true);
            taskCompleted = false;
            activeJobKey = '';
            clearTimeout(reconnectTimer);

            statusMsg.style.display = 'none';
            showProgress();
            setProgress(3, '');

            try {
                const response = await fetch('/api/run-process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, cdk: verifiedCdk })
                });
                const data = await response.json();

                if (data.success && data.jobKey) {
                    setProgress(8, '');
                    showStatus('任务已启动，正在为您开通中...', 'success');
                    initWebSocket(data.jobKey);
                } else {
                    hideProgress();
                    showStatus(data.message || '启动失败', 'error');
                    setButtonText(startBtn, START_FAILED_TEXT);
                    toggleLoading(startBtn, false);
                    setActivationLock(false);
                }
            } catch (error) {
                hideProgress();
                showStatus('网络连接失败，请重试', 'error');
                setButtonText(startBtn, START_FAILED_TEXT);
                toggleLoading(startBtn, false);
                setActivationLock(false);
            }
        });

        function toggleLoading(btn, isLoading, options = {}) {
            const keepTextVisible = Boolean(options.keepTextVisible);
            const text = btn.querySelector('.btn-text');
            const loader = btn.querySelector('.loader');
            btn.disabled = isLoading;
            btn.classList.toggle('is-loading', isLoading && keepTextVisible);
            if (text) {
                text.style.display = isLoading && !keepTextVisible ? 'none' : 'block';
            }
            if (loader) {
                loader.style.display = isLoading ? 'block' : 'none';
            }
        }

        function setButtonText(btn, content) {
            const text = btn.querySelector('.btn-text');
            if (text) {
                text.textContent = content;
            }
        }

        function showProgress() {
            taskProgress.style.display = 'block';
        }

        function hideProgress() {
            taskProgress.style.display = 'none';
            taskProgressValue = 0;
            taskProgressBar.style.width = '0%';
            taskProgressBar.classList.remove('error');
            taskProgressPercent.textContent = '0%';
        }

        function setProgress(percent, label = '', type = 'running') {
            const maxAllowed = type === 'success' ? 100 : 99;
            const requested = Math.max(0, Math.min(maxAllowed, Math.round(percent)));
            const next = requested < taskProgressValue ? taskProgressValue : requested;
            taskProgressValue = next;
            taskProgressBar.style.width = `${next}%`;
            taskProgressPercent.textContent = `${next}%`;
            // 文本标签强制隐藏
            taskProgressText.style.display = 'none';
            taskProgressText.textContent = label;
            taskProgressBar.classList.toggle('error', type === 'error');
        }

        function showStatus(message, type) {
            statusMsg.innerHTML = message;
            statusMsg.className = `status-message ${type === 'success' ? 'status-success' : 'status-error'}`;
            statusMsg.style.display = 'block';
        }

        function renderPublicSlotGrid(active, max) {
            if (!publicRuntimeCard || !publicForegroundSlotGrid || !publicForegroundSlotsMeta) {
                return;
            }

            const safeMax = Math.max(1, Number(max) || 1);
            const safeActive = Math.max(0, Math.min(safeMax, Number(active) || 0));
            const usageRate = safeMax > 0 ? (safeActive / safeMax) : 0;
            let loadClass = 'load-low';
            let loadText = '当前空闲，前台槽位状态正常';

            if (usageRate >= 0.8) {
                loadClass = 'load-high';
                loadText = '前台槽位占用较高，请注意并发压力';
            } else if (usageRate >= 0.6) {
                loadClass = 'load-mid';
                loadText = '前台槽位占用过半，接近繁忙状态';
            } else if (safeActive > 0) {
                loadText = '前台槽位运行中，当前负载正常';
            }

            publicRuntimeCard.classList.remove('load-low', 'load-mid', 'load-high');
            publicRuntimeCard.classList.add(loadClass);
            publicForegroundSlotsMeta.textContent = loadText;
            publicForegroundSlotGrid.innerHTML = Array.from({ length: safeMax }, (_, index) => {
                const occupied = index < safeActive;
                return `<div class="public-slot-box ${occupied ? 'occupied' : 'idle'}"></div>`;
            }).join('');
        }

        async function loadPublicRuntime() {
            try {
                const response = await fetch('/api/public/runtime');
                const data = await response.json();
                if (!data.success) {
                    return;
                }
                const active = Number(data.runtime?.active_foreground_jobs || 0);
                const max = Number(data.runtime?.max_foreground_jobs || 1);
                if (publicForegroundSlots) {
                    publicForegroundSlots.textContent = `${active}/${max}`;
                }
                renderPublicSlotGrid(active, max);
            } catch (_) { }
        }

        loadPublicRuntime();
        publicRuntimeTimer = setInterval(loadPublicRuntime, 3000);

        lucide.createIcons();
    </script>
</body>
