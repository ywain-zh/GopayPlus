<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 | PLUS ADMIN</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-soft: #eff6ff;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.18);
            --bg: #f4f7fb;
            --panel: #ffffff;
            --border: #e5e7eb;
            --border-strong: #cbd5e1;
            --text: #0f172a;
            --text-dim: #64748b;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --error-soft: #fef2f2;
            --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.10), 0 4px 12px rgba(15, 23, 42, 0.05);
            --shadow-focus: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 12% 8%, rgba(37, 99, 235, 0.10), transparent 45%),
                radial-gradient(circle at 90% 92%, rgba(14, 165, 233, 0.08), transparent 45%),
                var(--bg);
            color: var(--text);
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
            border: 2px solid var(--bg);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: var(--shadow-lg);
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            display: grid;
            place-items: center;
            color: #ffffff;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 8px 18px var(--accent-glow);
        }

        .brand-text {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 24px;
            line-height: 1.55;
            font-size: 14px;
        }

        p code {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 2px 7px;
            border-radius: 6px;
            font-family: 'SF Mono', Consolas, monospace;
            font-size: 0.9em;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        input:hover {
            border-color: var(--border-strong);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: var(--shadow-focus);
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px 16px;
            border: 1px solid var(--primary);
            border-radius: 12px;
            background: var(--primary);
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: var(--text-muted);
            border-color: var(--text-muted);
        }

        .message {
            margin-top: 14px;
            min-height: 22px;
            font-size: 13px;
            color: var(--error);
            padding: 0;
        }

        .message:not(:empty) {
            background: var(--error-soft);
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 8px 12px;
        }

        .hint {
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.55;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>后台登录</h1>
        <p>输入后台密码后进入管理控制台。默认密码为 <code>admin</code>。</p>
        <label for="password">管理密码</label>
        <input id="password" type="password" placeholder="请输入后台密码" autocomplete="current-password">
        <button id="loginBtn" type="button">登录后台</button>
        <div id="message" class="message"></div>
        <div class="hint">Token 有效期 24 小时，超过 1 小时进入后台时会自动刷新。</div>
    </main>

    <script>
        const TOKEN_KEY = 'plus_admin_token';
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const messageEl = document.getElementById('message');

        function setMessage(message) {
            messageEl.textContent = message || '';
        }

        async function verifyExistingToken() {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) {
                return;
            }

            try {
                const response = await fetch('/api/admin/session', {
                    headers: { Authorization: `Bearer ${token}` }
                });

                if (!response.ok) {
                    localStorage.removeItem(TOKEN_KEY);
                    return;
                }

                const data = await response.json();
                if (data.refreshed && data.token) {
                    localStorage.setItem(TOKEN_KEY, data.token);
                }
                location.href = '/admin';
            } catch (error) {
                localStorage.removeItem(TOKEN_KEY);
            }
        }

        async function login() {
            const password = passwordInput.value.trim();
            if (!password) {
                setMessage('请输入后台密码');
                return;
            }

            loginBtn.disabled = true;
            setMessage('');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                if (!response.ok || !data.success || !data.token) {
                    setMessage(data.message || '登录失败');
                    return;
                }

                localStorage.setItem(TOKEN_KEY, data.token);
                location.href = '/admin';
            } catch (error) {
                setMessage('登录请求失败');
            } finally {
                loginBtn.disabled = false;
            }
        }

        loginBtn.addEventListener('click', login);
        passwordInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                login();
            }
        });

        verifyExistingToken();
    </script>
</body>
</html>
